<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272d37"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fb"/>
      <stop offset="0.55" stop-color="#c3c9d1"/>
      <stop offset="1" stop-color="#878e98"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d5966"/>
      <stop offset="1" stop-color="#1b2128"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="13" y="9" width="38" height="42" rx="11"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- rails -->
  <rect x="20" y="54" width="3" height="6" rx="1.5" fill="#3c434e"/>
  <rect x="41" y="54" width="3" height="6" rx="1.5" fill="#3c434e"/>

  <!-- train front -->
  <rect x="13" y="9" width="38" height="42" rx="11" fill="url(#body)"/>
  <g clip-path="url(#bodyClip)">
    <rect x="13" y="31.5" width="38" height="6.5" fill="#e60012"/>
    <rect x="13" y="46.5" width="38" height="4.5" fill="#5b6470"/>
  </g>
  <rect x="13.6" y="9.6" width="36.8" height="40.8" rx="10.4" fill="none" stroke="rgba(15,19,25,0.45)" stroke-width="1.2"/>

  <!-- windscreen -->
  <rect x="18" y="14" width="28" height="13.5" rx="6" fill="url(#glass)"/>
  <rect x="20" y="15.5" width="24" height="3.2" rx="1.6" fill="rgba(255,255,255,0.28)"/>

  <!-- headlights -->
  <circle cx="21.5" cy="43" r="3.1" fill="#ffedb0" stroke="rgba(15,19,25,0.4)" stroke-width="0.9"/>
  <circle cx="42.5" cy="43" r="3.1" fill="#ffedb0" stroke="rgba(15,19,25,0.4)" stroke-width="0.9"/>
</svg>
